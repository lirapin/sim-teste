            align-items: center;
            justify-content: center;
        }

        .header-btn:hover {
            background: #ffebee;
            border-color: #d32f2f;
        }

            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px 44px 10px 16px;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }

        .search-input:focus {
            outline: none;
            border-color: #d32f2f;
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        }

        .search-button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #6b7280;
            padding: 8px;
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-button:hover {
            background: #ffebee;
            color: #d32f2f;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.25s ease-out;
        }

        .grid-apps {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
        }

        .login-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            box-shadow: 0 18px 45px rgba(44, 62, 80, 0.18);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }

        .modal-card {
            background: white;
            border-radius: 22px;
            width: min(500px, 100%);

            overflow: auto;
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.25);

            width: 8px;
            height: 8px;

            border-radius: 10px;

            background: #d32f2f;

        }

</head>

        return String(text || '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '');
    };

        if (!item.children) return 0;
        return item.children.reduce((acc, child) => {
            return acc + (child.type === 'link' ? 1 : countLinks(child));
        }, 0);
    };

    const buildSearchIndex = (items, path = []) => {
        let results = [];
        items.forEach(item => {
            if (item.type === 'link') {
                results.push({
                    ...item,
                    path: [...path],
                    searchable: normalizeText([...path, item.name].join(' '))
                });
            } else if (item.type === 'folder' && item.children) {
                results.push(...buildSearchIndex(item.children, [...path, item.name]));
            }
        });
        return results;
    };

                    onChange: (e) => setTarget(e.target.value)
                }, [
                    React.createElement('option', { key: 'todos', value: 'todos' }, 'Todos os usuários'),
                    ...USERS.map(u => React.createElement('option', { key: u.username, value: u.username }, u.displayName))
                ]),
                React.createElement('textarea', {
                    key: 'text',
                    className: 'search-input mb-2',
                    rows: 3,
                    placeholder: 'Digite sua mensagem...',
                    value: text,
                    onChange: (e) => setText(e.target.value)
                }),
                React.createElement('button', {
                    key: 'send',
                    onClick: sendMessage,
                    className: 'bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl px-4 py-2 transition-all'
                }, 'Enviar mensagem')
            ]),
            React.createElement('div', {
                key: 'messages-list',
                className: 'space-y-3 max-h-96 overflow-y-auto'
            }, visibleMessages.length === 0 ? React.createElement('p', {
                key: 'empty',
                className: 'text-gray-500 text-center py-8'
            }, 'Nenhuma mensagem disponível') : visibleMessages.map(m => React.createElement('div', {
                key: m.id,
                className: 'border rounded-2xl p-4'
            }, [
                React.createElement('div', {
                    key: 'header',
                    className: 'text-xs text-gray-500 mb-1'
                }, `${m.date} • De: ${m.from} • Para: ${m.to === 'todos' ? 'Todos' : m.to}`),
                React.createElement('p', {
                    key: 'text',
                    className: 'text-sm text-gray-800'
                }, m.text)
            ])))
        ]));
    };

    const CategoryTabs = ({ categories, activeCategory, onSelect }) => {
        return React.createElement('div', {
            className: 'flex gap-2 overflow-x-auto pb-2 mb-6 scrollbar-hide'
        }, categories.map(cat => React.createElement('button', {
            key: cat.name,
            onClick: () => onSelect(cat.name),
            className: `tab-button ${activeCategory === cat.name ? 'active' : ''}`
        }, [
            React.createElement(IconComponent, {
                key: 'icon',
                name: cat.icon || 'Folder',
                size: 16,
                className: 'mr-2'
            }),
            cat.name
        ])));
    };

    const SearchResults = ({ searchTerm }) => {
        const normalizedSearch = normalizeText(searchTerm);
        
        const results = React.useMemo(() => {
            if (!normalizedSearch) return [];
            return searchIndex.filter(item => 
                normalizeText(item.name).includes(normalizedSearch) || 
                item.searchable.includes(normalizedSearch)
            );
        }, [normalizedSearch]);

        if (results.length === 0) {
            return React.createElement('div', {
                className: 'text-center py-20'
            }, [
                React.createElement(IconComponent, {
                    key: 'icon',
                    name: 'Search',
                    size: 48,
                    className: 'mx-auto text-gray-400 mb-4'
                }),
                React.createElement('p', {
                    key: 'text',
                    className: 'text-gray-500'
                }, `Nenhum resultado encontrado para "${searchTerm}"`)
            ]);
        }

        return React.createElement('div', {
            className: 'grid-apps fade-in'
        }, results.map((result, idx) => React.createElement(AppCard, {
            key: `${result.name}-${idx}`,
            item: result
        })));
    };

    const FolderView = ({ folder, onOpenFolder, onBack }) => {
        return React.createElement(React.Fragment, null, [
            React.createElement('div', {
                key: 'nav',
                className: 'flex items-center gap-3 mb-6'
            }, [
                React.createElement('button', {
                    onClick: onBack,
                    className: 'header-btn'
                }, [
                    React.createElement(IconComponent, { key: 'icon', name: 'ArrowLeft', size: 18 }),
                    React.createElement('span', { key: 'text', className: 'ml-2 font-semibold' }, 'Voltar')
                ]),
                React.createElement('h2', {
                    key: 'title',
                    className: 'text-xl font-bold text-gray-700'
                }, folder.name)
            ]),
            React.createElement('div', {
                key: 'grid',
                className: 'grid-apps'
            }, folder.children.map((item, idx) => React.createElement(AppCard, {
                key: `${item.name}-${idx}`,
                item,
                onFolderOpen: onOpenFolder
            })))
        ]);
    };

    // ==================== APP PRINCIPAL ====================
    const App = () => {
        const [user, setUser] = React.useState(() => {
            const saved = localStorage.getItem('sim_user');
            return saved ? JSON.parse(saved) : null;
        });
        const [activeCategory, setActiveCategory] = React.useState(bookmarkData[0]?.name || 'Social');
        const [searchTerm, setSearchTerm] = React.useState('');
        const [navigationStack, setNavigationStack] = React.useState([]);
        const [currentFolder, setCurrentFolder] = React.useState(null);
        const [showMessages, setShowMessages] = React.useState(false);
        const [messages, setMessagesState] = React.useState(() => {
            const saved = localStorage.getItem('sim_messages');
            return saved ? JSON.parse(saved) : [];
        });

        const setMessages = (newMessages) => {
            setMessagesState(newMessages);
            localStorage.setItem('sim_messages', JSON.stringify(newMessages));
        };

        const handleLogin = (userData) => {
            setUser(userData);
            localStorage.setItem('sim_user', JSON.stringify(userData));
        };

        const handleLogout = () => {
            localStorage.removeItem('sim_user');
            setUser(null);
            setCurrentFolder(null);
            setNavigationStack([]);
            setSearchTerm('');
        };

        const openFolder = (folder) => {
            setNavigationStack(prev => [...prev, currentFolder || bookmarkData.find(c => c.name === activeCategory)]);
            setCurrentFolder(folder);
            setSearchTerm('');
        };

        const goBack = () => {
            const previous = navigationStack[navigationStack.length - 1];
            setNavigationStack(prev => prev.slice(0, -1));
            setCurrentFolder(previous);
        };

        const selectCategory = (categoryName) => {
            setActiveCategory(categoryName);
            setCurrentFolder(null);
            setNavigationStack([]);
            setSearchTerm('');
        };

        if (!user) {
            return React.createElement(LoginPage, { onLogin: handleLogin });
        }

        const currentCategory = bookmarkData.find(c => c.name === activeCategory);
        const displayContent = () => {
            if (searchTerm) {
                return React.createElement(SearchResults, { searchTerm });
            }
            if (currentFolder) {
                return React.createElement(FolderView, {
                    folder: currentFolder,
                    onOpenFolder: openFolder,
                    onBack: goBack
                });
            }
            return React.createElement(React.Fragment, null, [
                React.createElement(CategoryTabs, {
                    key: 'tabs',
                    categories: bookmarkData,
                    activeCategory,
                    onSelect: selectCategory
                }),
                React.createElement('div', {
                    key: 'grid',
                    className: 'grid-apps'
                }, currentCategory?.children.map((item, idx) => React.createElement(AppCard, {
                    key: `${item.name}-${idx}`,
                    item,
                    onFolderOpen: openFolder
                })))
            ]);
        };

        return React.createElement('div', {
            className: 'min-h-screen',
            style: { background: '#d1d5db' }
        }, [
            React.createElement('header', {
                key: 'header',
                className: 'bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm'
            }, React.createElement('div', {
                className: 'max-w-7xl mx-auto px-5 py-4'
            }, React.createElement('div', {
                className: 'flex flex-col md:flex-row md:items-center md:justify-between gap-4'
            }, [
                React.createElement('div', {
                    key: 'brand',
                    className: 'flex items-center gap-3'
                }, [
                    React.createElement('div', {
                        className: 'w-12 h-12 rounded-2xl bg-red-600 flex items-center justify-center shadow-md text-white'
                    }, React.createElement(IconComponent, { name: 'Owl', size: 26 })),
                    React.createElement('div', {}, [
                        React.createElement('h1', { className: 'text-2xl font-bold text-red-700' }, 'SIM'),
                        React.createElement('p', { className: 'text-xs text-gray-500' }, `Bem-vindo, ${user.displayName}`)
                    ])
                ]),
                React.createElement('div', {
                    key: 'actions',
                    className: 'flex items-center gap-3 flex-1 md:max-w-xl'
                }, [
                    React.createElement('div', {
                        key: 'search',
                        className: 'relative flex-1'
                    }, [
                        React.createElement('input', {
                            type: 'text',
                            className: 'search-input',
                            placeholder: 'Buscar ferramentas...',
                            value: searchTerm,
                            onChange: (e) => setSearchTerm(e.target.value)
                        }),
                        searchTerm && React.createElement('button', {
                            className: 'search-button',
                            onClick: () => setSearchTerm('')
                        }, React.createElement(IconComponent, { name: 'X', size: 18 }))
                    ]),
                    React.createElement('button', {
                        key: 'messages',
                        onClick: () => setShowMessages(true),
                        className: 'header-btn',
                        title: 'Mensagens'
                    }, React.createElement(IconComponent, { name: 'MessageCircle', size: 18 })),
                    React.createElement('button', {
                        key: 'logout',
                        onClick: handleLogout,
                        className: 'header-btn',
                        title: 'Sair'
                    }, React.createElement(IconComponent, { name: 'LogOut', size: 18 }))
                ])
            ]))),
            React.createElement('main', {
                key: 'main',
                className: 'max-w-7xl mx-auto px-5 py-8'
            }, displayContent()),
            showMessages && React.createElement(MessageCenter, {
                key: 'messages',
                user,
                messages,
                setMessages,
                onClose: () => setShowMessages(false)
            })
        ]);
    };

    // ==================== RENDERIZAÇÃO ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
</script>
</body>
</html>
