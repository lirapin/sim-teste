        :root {

            --color-primary-hover: #c62828;
            --color-page: #d1d5db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-muted: #7f8c8d;
            --color-border: #e0e0e0;
            --color-highlight: #ffebee;
        }
        * { box-sizing: border-box; }
        body { background: var(--color-page); font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif; }
        .app-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 20px; transition: all 0.2s ease; cursor: pointer; aspect-ratio: 1 / 0.9; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 12px rgba(44, 62, 80, 0.08); }
        .app-card:hover { background: var(--color-highlight); border-color: var(--color-primary); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(211, 47, 47, 0.15); }
        .app-card:active { transform: translateY(1px); }
        .icon-wrapper { width: 56px; height: 56px; border-radius: 18px; background: transparent; display: flex; align-items: center; justify-content: center; color: #5a5a5a; transition: all 0.2s ease; }
        .app-card:hover .icon-wrapper { background: transparent; color: var(--color-primary); }
        .app-name { font-size: 13px; font-weight: 600; color: var(--color-text); text-align: center; line-height: 1.3; padding: 0 8px; }
        .folder-card { background: linear-gradient(135deg, #f8f9fa 0%, #eef2f3 100%); border: 1px solid var(--color-border); border-radius: 20px; transition: all 0.2s ease; cursor: pointer; aspect-ratio: 1 / 0.9; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; position: relative; box-shadow: 0 4px 12px rgba(44, 62, 80, 0.08); }
        .folder-card:hover { background: var(--color-highlight); border-color: var(--color-primary); transform: translateY(-2px); }
        .folder-badge { position: absolute; top: 12px; right: 12px; background: var(--color-primary); color: white; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 20px; min-width: 28px; text-align: center; }
        .tab-button { background: #f3f4f6; color: var(--color-text); border: none; padding: 10px 14px; border-radius: 14px; font-weight: 600; font-size: 14px; transition: all 0.2s ease; cursor: pointer; white-space: nowrap; width: 156px; min-width: 156px; height: 44px; display: inline-flex; align-items: center; justify-content: center; }
        .tab-button.active { background: var(--color-primary); color: white; box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3); }
        .tab-button:hover:not(.active) { background: #e5e7eb; transform: translateY(-1px); }
        .header-btn { background: white; border: 1px solid var(--color-border); border-radius: 14px; padding: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .header-btn:hover { background: var(--color-highlight); border-color: var(--color-primary); transform: translateY(-1px); }
        .search-input { border: 1px solid var(--color-border); border-radius: 14px; padding: 10px 44px 10px 16px; width: 100%; font-size: 14px; transition: all 0.2s ease; background: white; }
        .search-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1); }
        .search-button { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); border: none; background: transparent; color: #6b7280; padding: 8px; cursor: pointer; border-radius: 10px; }
        .search-button:hover { background: var(--color-highlight); color: var(--color-primary); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        .grid-apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 16px; }
        .login-card { background: white; border: 1px solid var(--color-border); border-radius: 24px; box-shadow: 0 18px 45px rgba(44, 62, 80, 0.18); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 18px; }
        .modal-card { background: white; border-radius: 22px; width: min(720px, 100%); max-height: 85vh; overflow: auto; box-shadow: 0 22px 60px rgba(0,0,0,.25); }
        @media (max-width: 640px) { .grid-apps { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; } .app-name { font-size: 11px; } .icon-wrapper { width: 48px; height: 48px; } .tab-button { width: 132px; min-width: 132px; } }
