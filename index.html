        .app-card, .folder-card {
            background: white;

            transition: all 0.2s ease;

            aspect-ratio: 1 / 0.9;

            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a5a5a;

        }
        .app-card:hover .icon-wrapper, .folder-card:hover .icon-wrapper { color: #d32f2f; }
        .app-name { font-size: 13px; font-weight: 600; color: #2c3e50; text-align: center; line-height: 1.3; padding: 0 8px; }
        .folder-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #d32f2f;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 20px;
            min-width: 28px;
            text-align: center;
        }
        .tab-button {
            background: #f3f4f6;
            color: #2c3e50;
            border: none;
            padding: 10px 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            min-width: 140px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tab-button.active { background: #d32f2f; color: white; box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3); }
        .tab-button:hover:not(.active) { background: #e5e7eb; transform: translateY(-1px); }
        .header-btn {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:hover { background: #ffebee; border-color: #d32f2f; }
        .search-input {
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px 44px 10px 16px;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }
        .search-input:focus { outline: none; border-color: #d32f2f; box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1); }
        .search-button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #6b7280;
            padding: 8px;
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-button:hover { background: #ffebee; color: #d32f2f; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        .grid-apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; }

            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;

    // Carregar os favoritos
    const bookmarkData = parseNetscapeBookmarks("");

    // ==================== UTILITÁRIOS ====================
    const normalizeText = (text) => {
        return String(text || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    };

    const countLinks = (item) => {
        if (!item.children) return 0;
        return item.children.reduce((acc, child) => {
            return acc + (child.type === 'link' ? 1 : countLinks(child));
        }, 0);
    };

    const buildSearchIndex = (items, path = []) => {
        let results = [];
        items.forEach(item => {
            if (item.type === 'link') {
                results.push({
                    ...item,
                    path: [...path],
                    searchable: normalizeText([...path, item.name].join(' '))
                });
            } else if (item.type === 'folder' && item.children) {
                results.push(...buildSearchIndex(item.children, [...path, item.name]));
            }
        });
        return results;
    };

    const searchIndex = buildSearchIndex(bookmarkData);

    // ==================== COMPONENTE DE ÍCONE ====================
    const IconComponent = ({ name, size = 24, className = "" }) => {
        const Icon = lucide && lucide[name];
        if (!Icon) {
            return React.createElement('div', { className, style: { width: size, height: size, background: '#e0e0e0', borderRadius: '8px' } });
        }
        return React.createElement(Icon, { size, className, strokeWidth: 1.8 });
    };

    // ==================== COMPONENTES PRINCIPAIS ====================
    const AppCard = ({ item, onFolderOpen }) => {
        const isFolder = item.type === 'folder';
        const linkCount = isFolder ? countLinks(item) : 0;
        
        const handleClick = () => {
            if (isFolder && onFolderOpen) {
                onFolderOpen(item);
            } else if (item.url) {
                window.open(item.url, '_blank', 'noopener,noreferrer');
            }
        };

        return React.createElement('div', {
            className: `${isFolder ? 'folder-card' : 'app-card'} fade-in`,
            onClick: handleClick
        }, [
            isFolder && linkCount > 0 && React.createElement('div', {
                key: 'badge',
                className: 'folder-badge'
            }, linkCount),
            React.createElement('div', {
                key: 'icon',
                className: 'icon-wrapper'
            }, React.createElement(IconComponent, {
                name: item.icon || (isFolder ? 'Folder' : 'Link'),
                size: 32
            })),
            React.createElement('div', {
                key: 'name',
                className: 'app-name'
            }, item.name.length > 30 ? item.name.substring(0, 27) + '...' : item.name)
        ]);
    };

    const LoginPage = ({ onLogin }) => {
        const [username, setUsername] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [error, setError] = React.useState('');

        const handleSubmit = (e) => {
            e.preventDefault();
            const user = USERS.find(u => u.username === username && u.password === password);
            if (user) {
                onLogin(user);
            } else {
                setError('Usuário ou senha inválidos');
            }
        };

        return React.createElement('div', {
            className: 'min-h-screen flex items-center justify-center p-5',
            style: { background: '#d1d5db' }
        }, React.createElement('form', {
            onSubmit: handleSubmit,
            className: 'login-card p-8 w-full max-w-sm'
        }, [
            React.createElement('div', {
                key: 'logo',
                className: 'mx-auto w-16 h-16 rounded-2xl bg-red-600 flex items-center justify-center text-white mb-4 shadow-md'
            }, React.createElement(IconComponent, { name: 'Star', size: 34 })),
            React.createElement('h1', {
                key: 'title',
                className: 'text-2xl font-bold text-center text-red-700 mb-1'
            }, 'SIM'),

                key: 'sub',
                className: 'text-center text-sm text-gray-500 mb-6'
            }, 'Sistema Integrado Madrugada'),
            React.createElement('input', {
                key: 'user',
                type: 'text',
                className: 'search-input mb-3',
                placeholder: 'Usuário',
                value: username,
                onChange: (e) => setUsername(e.target.value)
            }),
            React.createElement('input', {
                key: 'pass',
                type: 'password',
                className: 'search-input mb-3',
                placeholder: 'Senha',
                value: password,
                onChange: (e) => setPassword(e.target.value)
            }),
            error && React.createElement('p', {
                key: 'error',
                className: 'text-sm text-red-600 mb-3 text-center'
            }, error),
            React.createElement('button', {
                key: 'btn',
                type: 'submit',
                className: 'w-full bg-red-600 hover:bg-red-700 text-white font-semibold rounded-2xl py-3 transition-all'
            }, 'Entrar')
        ]));

            key: cat.name,
            onClick: () => onSelect(cat.name),
            className: `tab-button ${activeCategory === cat.name ? 'active' : ''}`

            React.createElement(IconComponent, {
                key: 'icon',
                name: cat.icon || 'Folder',
                size: 16,
                className: 'mr-2'
            }),
            cat.name
        ])));
    };

    const SearchResults = ({ searchTerm }) => {
        const normalizedSearch = normalizeText(searchTerm);
        
        const results = React.useMemo(() => {
            if (!normalizedSearch) return [];
            return searchIndex.filter(item => 
                normalizeText(item.name).includes(normalizedSearch) || 
                item.searchable.includes(normalizedSearch)
            );
        }, [normalizedSearch]);

        if (results.length === 0) {
            return React.createElement('div', {
                className: 'text-center py-20'
            }, [
                React.createElement(IconComponent, {
                    key: 'icon',
                    name: 'Search',
                    size: 48,
                    className: 'mx-auto text-gray-400 mb-4'
                }),
                React.createElement('p', {
                    key: 'text',
                    className: 'text-gray-500'
                }, `Nenhum resultado encontrado para "${searchTerm}"`)
            ]);
        }

        return React.createElement('div', {
            className: 'grid-apps fade-in'
        }, results.map((result, idx) => React.createElement(AppCard, {
            key: `${result.name}-${idx}`,
            item: result
        })));
    };

    const FolderView = ({ folder, onOpenFolder, onBack }) => {
        return React.createElement(React.Fragment, null, [
            React.createElement('div', {
                key: 'nav',
                className: 'flex items-center gap-3 mb-6'
            }, [
                React.createElement('button', {
                    onClick: onBack,
                    className: 'header-btn'
                }, [
                    React.createElement(IconComponent, { key: 'icon', name: 'ArrowLeft', size: 18 }),
                    React.createElement('span', { key: 'text', className: 'ml-2 font-semibold' }, 'Voltar')
                ]),
                React.createElement('h2', {
                    key: 'title',
                    className: 'text-xl font-bold text-gray-700'
                }, folder.name)
            ]),
            React.createElement('div', {
                key: 'grid',

                key: `${item.name}-${idx}`,
                item,
                onFolderOpen: onOpenFolder
            })))
        ]);

    // ==================== APP PRINCIPAL ====================
    const App = () => {
        const [user, setUser] = React.useState(() => {
            const saved = localStorage.getItem('sim_user');
            return saved ? JSON.parse(saved) : null;
        });
        const [activeCategory, setActiveCategory] = React.useState(bookmarkData[0]?.name || 'Empresarial');
        const [searchTerm, setSearchTerm] = React.useState('');
        const [navigationStack, setNavigationStack] = React.useState([]);
        const [currentFolder, setCurrentFolder] = React.useState(null);

        const handleLogin = (userData) => {
            setUser(userData);
            localStorage.setItem('sim_user', JSON.stringify(userData));
        };

        const handleLogout = () => {
            localStorage.removeItem('sim_user');
            setUser(null);
            setCurrentFolder(null);
            setNavigationStack([]);
            setSearchTerm('');
        };

        const openFolder = (folder) => {
            setNavigationStack(prev => [...prev, currentFolder || bookmarkData.find(c => c.name === activeCategory)]);
            setCurrentFolder(folder);
            setSearchTerm('');
        };

        const goBack = () => {
            const previous = navigationStack[navigationStack.length - 1];
            setNavigationStack(prev => prev.slice(0, -1));
            setCurrentFolder(previous);
        };

        const selectCategory = (categoryName) => {
            setActiveCategory(categoryName);
            setCurrentFolder(null);
            setNavigationStack([]);
            setSearchTerm('');
        };

        if (!user) {
            return React.createElement(LoginPage, { onLogin: handleLogin });
        }

        const currentCategory = bookmarkData.find(c => c.name === activeCategory);
        const displayContent = () => {
            if (searchTerm) {
                return React.createElement(SearchResults, { searchTerm });
            }
            if (currentFolder) {
                return React.createElement(FolderView, {
                    folder: currentFolder,
                    onOpenFolder: openFolder,
                    onBack: goBack
                });
            }
            if (!currentCategory) return React.createElement('div', null, 'Categoria não encontrada');
            
            return React.createElement(React.Fragment, null, [
                React.createElement(CategoryTabs, {
                    key: 'tabs',
                    categories: bookmarkData,
                    activeCategory,
                    onSelect: selectCategory
                }),
                React.createElement('div', {
                    key: 'grid',
                    className: 'grid-apps'
                }, currentCategory.children.map((item, idx) => React.createElement(AppCard, {
                    key: `${item.name}-${idx}`,
                    item,
                    onFolderOpen: openFolder
                })))

        };

            style: { background: '#d1d5db' }
