<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIM - Sistema Integrado Madrugada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #d1d5db; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif; }
        .app-card, .folder-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, background 0.16s ease;
            cursor: pointer;
            aspect-ratio: 1 / 0.95;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.13), 0 5px 12px rgba(15, 23, 42, 0.08);
            position: relative;
            font-family: inherit;
        }
        .app-card:hover, .folder-card:hover {
            background: #fff7f7;
            border-color: #d32f2f;
            transform: translateY(-3px);
            box-shadow: 0 22px 38px rgba(15, 23, 42, 0.17), 0 10px 24px rgba(211, 47, 47, 0.15);
        }
        .app-card:active, .folder-card:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: inset 0 3px 8px rgba(15, 23, 42, 0.16), 0 4px 10px rgba(15, 23, 42, 0.08);
        }
        .folder-card::after {
            content: "";
            position: absolute;
            right: 16px;
            bottom: 14px;
            width: 9px;
            height: 9px;
            border-right: 2px solid #ef4444;
            border-bottom: 2px solid #ef4444;
            transform: rotate(-45deg);
            pointer-events: none;
        }
        .folder-card:hover::after { border-color: #dc2626; }
        .icon-wrapper {
            width: 56px;
            height: 56px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease;
        }
        .icon-wrapper::before {
            content: "";
            position: absolute;
            width: 48px;
            height: 42px;
            background: rgba(244, 63, 94, 0.14);
            border-radius: 47% 53% 45% 55% / 58% 42% 54% 46%;
            transform: rotate(-8deg);
            filter: blur(0.2px);
            z-index: 0;
        }
        .app-card:hover .icon-wrapper::before, .folder-card:hover .icon-wrapper::before {
            background: rgba(244, 63, 94, 0.2);
            transform: rotate(6deg) scale(1.06);
        }
        .emoji-icon { font-size: 34px; line-height: 1; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
        .app-card:hover .emoji-icon, .folder-card:hover .emoji-icon { transform: scale(1.08); }
        .brand-icon {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            line-height: 1;
            filter: drop-shadow(0 5px 8px rgba(15, 23, 42, 0.14));
            position: relative;
            z-index: 1;
        }
        .copilot-logo::before { content: "\1F308"; }
        .onedrive-logo { color: #2563eb; font-size: 40px; text-shadow: 0 5px 10px rgba(37, 99, 235, 0.18); }
        .onedrive-logo::before { content: "\2601"; }
        .custom-image-icon {
            width: 54px;
            height: 54px;
            object-fit: contain;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 5px 8px rgba(15, 23, 42, 0.12));
        }
        .custom-image-icon.rounded-brand { border-radius: 12px; }
        .app-card:hover .brand-icon, .folder-card:hover .brand-icon { transform: scale(1.08); }
        .app-card:hover .custom-image-icon, .folder-card:hover .custom-image-icon { transform: scale(1.08); }
        .app-name { font-size: 13px; font-weight: 600; color: #2c3e50; text-align: center; line-height: 1.3; padding: 0 8px; word-break: break-word; }
        .tab-button {
            background: #ffffff;
            color: #2c3e50;
            border: 1px solid #e5e7eb;
            padding: 10px 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            min-width: 140px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tab-button.active {
            background: #d32f2f;
            color: white;
            border-color: #d32f2f;
            box-shadow: 0 10px 22px rgba(211, 47, 47, 0.24), 0 3px 8px rgba(211, 47, 47, 0.16);
        }
        .tab-button:hover:not(.active) { background: #fff7f7; border-color: #f0b4b4; transform: translateY(-1px); }
        .tab-button:active {
            transform: translateY(1px);
            box-shadow: inset 0 2px 6px rgba(15, 23, 42, 0.14), 0 6px 14px rgba(15, 23, 42, 0.08);
        }
        .tab-button.active:active {
            box-shadow: inset 0 2px 7px rgba(127, 29, 29, 0.18), 0 9px 20px rgba(211, 47, 47, 0.22);
        }
        .header-btn:active { transform: translateY(1px) scale(0.98); box-shadow: inset 0 2px 6px rgba(15, 23, 42, 0.14); }
        .header-btn {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .header-btn:hover { background: #ffebee; border-color: #d32f2f; }
        .notification-badge {
            position: absolute;
            right: -5px;
            top: -6px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: #dc2626;
            color: #ffffff;
            font-size: 11px;
            font-weight: 800;
            line-height: 18px;
            text-align: center;
            z-index: 2;
            box-shadow: 0 6px 12px rgba(220, 38, 38, 0.28);
        }
        .header-icon-btn::before {
            content: "";
            position: absolute;
            width: 30px;
            height: 26px;
            background: rgba(244, 63, 94, 0.14);
            border-radius: 48% 52% 44% 56% / 58% 42% 55% 45%;
            transform: rotate(-8deg);
            z-index: 0;
        }
        .search-input {
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px 44px 10px 16px;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }
        .search-input:focus { outline: none; border-color: #d32f2f; box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1); }
        .search-button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #6b7280;
            padding: 8px;
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-button:hover { background: #ffebee; color: #d32f2f; }
        .search-clear-icon { color: #ef4444; display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        .grid-apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 18px; }
        .category-grid {
            grid-template-columns: repeat(auto-fit, 150px);
            justify-content: center;
            justify-items: stretch;
        }
        .main-shell {
            max-width: 1040px;
            margin: 0 auto;
            padding: 32px 20px;
        }
        .top-shell {
            width: calc(100% - 40px);
            max-width: 1000px;
            margin: 14px auto 0;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            box-shadow: 0 20px 46px rgba(15, 23, 42, 0.17), 0 7px 18px rgba(15, 23, 42, 0.08);
        }
        .content-tray {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            box-shadow: 0 28px 64px rgba(15, 23, 42, 0.20), 0 12px 28px rgba(15, 23, 42, 0.11);
            padding: 22px;
            min-height: 220px;
        }
        .tray-inner { width: 100%; }
        .tray-inner.category-layout { width: 100%; }
        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0 16px;
            margin: -4px 0 10px;
            justify-content: center;
        }
        .signature {
            color: #8b95a1;
            font-size: 12px;
            text-align: center;
            margin-top: 18px;
            letter-spacing: 0;
        }
        .login-card { background: white; border: 1px solid #e0e0e0; border-radius: 24px; box-shadow: 0 18px 45px rgba(44, 62, 80, 0.18); }
        .brand-home-btn {
            border: 0;
            background: transparent;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            text-align: left;
        }
        .brand-home-btn:hover .brand-copy h1 { color: #b71c1c; }
        .portal-logo {
            width: 46px;
            height: 46px;
            object-fit: contain;
            filter: drop-shadow(0 5px 8px rgba(15, 23, 42, 0.16));
        }
        .login-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            filter: drop-shadow(0 5px 8px rgba(15, 23, 42, 0.16));
        }
        .top-emoji { font-size: 20px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; }
        .top-image-icon { width: 24px; height: 24px; object-fit: contain; display: block; position: relative; z-index: 1; }
        .top-line-icon { color: #ef4444; position: relative; z-index: 1; stroke-width: 2; }
        .message-field { position: relative; }
        .message-field textarea { padding-right: 48px; }
        .attachment-btn {
            position: absolute;
            right: 10px;
            bottom: 12px;
            width: 30px;
            height: 30px;
            border: 1px solid #f3c5c5;
            border-radius: 10px;
            background: #fff5f5;
            color: #ef4444;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.16s ease;
        }
        .attachment-btn:hover { background: #ffebee; border-color: #ef4444; transform: translateY(-1px); }
        .attachment-input { display: none; }
        .attachment-list {
            margin-top: -2px;
            margin-bottom: 10px;
            color: #64748b;
            font-size: 12px;
            line-height: 1.4;
        }
        .message-success {
            color: #047857;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 12px;
            padding: 8px 10px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        .message-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .message-tab {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 12px;
            transition: all 0.16s ease;
        }
        .message-tab.active {
            background: #dc2626;
            border-color: #dc2626;
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(220, 38, 38, 0.22);
        }
        .read-notice {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 12px;
            color: #9a3412;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.45;
            padding: 8px 10px;
            margin-bottom: 10px;
        }
        .read-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
        }
        .check-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid #fecaca;
            border-radius: 10px;
            background: #fff5f5;
            color: #ef4444;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.16s ease;
        }
        .check-toggle.active {
            background: #dcfce7;
            border-color: #86efac;
            color: #16a34a;
        }
        .confirm-read-btn {
            border: 0;
            border-radius: 10px;
            background: #dc2626;
            color: #ffffff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 12px;
            transition: all 0.16s ease;
        }
        .confirm-read-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .confirm-read-btn:not(:disabled):hover { background: #b91c1c; transform: translateY(-1px); }
        .read-confirmed {
            color: #047857;
            font-size: 12px;
            font-weight: 700;
            margin-top: 10px;
        }
        .message-list { max-height: min(560px, 62vh); }
        .daily-summary {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            background: #ffffff;
            overflow: hidden;
        }
        .daily-summary + .daily-summary { margin-top: 10px; }
        .daily-summary summary {
            cursor: pointer;
            list-style: none;
            padding: 12px 14px;
            color: #1f2937;
            font-size: 14px;
            font-weight: 800;
        }
        .daily-summary summary::-webkit-details-marker { display: none; }
        .daily-summary-body {
            border-top: 1px solid #e5e7eb;
            padding: 12px 14px;
            color: #475569;
            font-size: 13px;
            line-height: 1.45;
        }
        .modal-header-actions { display: flex; align-items: center; gap: 8px; }
        .danger-line-icon { color: #dc2626; position: relative; z-index: 1; }
        .delete-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border: 1px solid #fecaca;
            border-radius: 14px;
            background: #fff5f5;
            color: #991b1b;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
            padding: 10px 12px;
        }
        .delete-check {
            width: 18px;
            height: 18px;
            accent-color: #dc2626;
            flex: 0 0 auto;
            margin-top: 2px;
        }
        .pdf-btn, .delete-confirm-btn {
            border: 0;
            border-radius: 10px;
            background: #dc2626;
            color: #ffffff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            padding: 8px 12px;
        }
        .pdf-btn:hover, .delete-confirm-btn:not(:disabled):hover { background: #b91c1c; }
        .delete-confirm-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .top-menu-wrap { position: relative; }
        .top-menu-popover {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            width: 210px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
            padding: 8px;
            z-index: 20;
        }
        .top-menu-item {
            width: 100%;
            border: 0;
            border-radius: 12px;
            background: transparent;
            color: #334155;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 800;
            padding: 10px 12px;
        }
        .top-menu-item:hover { background: #fff5f5; color: #dc2626; }
        .hidden-file-input { display: none; }
        .contacts-page { display: flex; flex-direction: column; gap: 18px; }
        .cluster-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            flex-wrap: wrap;
        }
        .cluster-btn {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            font-weight: 800;
            min-width: 132px;
            height: 44px;
            padding: 0 18px;
            transition: all 0.16s ease;
        }
        .cluster-btn.active, .cluster-btn:hover {
            background: #dc2626;
            border-color: #dc2626;
            color: #ffffff;
            box-shadow: 0 10px 22px rgba(220, 38, 38, 0.2);
        }
        .contact-hero {
            min-height: 210px;
            border: 1px dashed #d1d5db;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.68);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contact-phone-logo {
            width: 96px;
            height: 96px;
            border-radius: 28px;
            background: #fff5f5;
            color: #dc2626;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
        }
        .contact-search-wrap { position: relative; width: 100%; }
        .contacts-table-wrap {
            overflow-x: auto;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.11);
        }
        .contacts-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 900px; }
        .contacts-table th, .contacts-table td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #eef2f7; font-size: 13px; vertical-align: middle; }
        .contacts-table th { color: #b91c1c; background: #fff5f5; font-size: 12px; text-transform: uppercase; font-weight: 900; }
        .contacts-table th:first-child { border-top-left-radius: 18px; }
        .contacts-table th:last-child { border-top-right-radius: 18px; }
        .contacts-table tr:last-child td { border-bottom: 0; }
        .contacts-table .contact-info-cell { text-align: center; width: 72px; }
        .contact-note-wrap { position: relative; display: inline-flex; justify-content: center; }
        .contact-note-btn {
            border: 1px solid #fecaca;
            border-radius: 999px;
            background: #fff5f5;
            color: #dc2626;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 7px 16px rgba(220, 38, 38, 0.12);
        }
        .contact-note-pop {
            position: absolute;
            right: 50%;
            top: calc(100% + 8px);
            transform: translateX(50%);
            width: min(260px, 70vw);
            border: 1px solid #fecaca;
            border-radius: 14px;
            background: #ffffff;
            color: #334155;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
            padding: 10px 12px;
            text-align: left;
            line-height: 1.35;
            z-index: 8;
        }
        .whatsapp-link { color: #047857; font-weight: 800; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
        .back-emoji-btn {
            border: none;
            background: transparent;
            color: #2c3e50;
            cursor: pointer;
            font-size: 28px;
            line-height: 1;
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.16s ease;
            filter: drop-shadow(0 4px 7px rgba(15, 23, 42, 0.12));
        }
        .back-emoji-btn:hover { transform: translateX(-2px) scale(1.08); }
        .back-image-icon { width: 32px; height: 32px; object-fit: contain; display: block; }
        .brand-copy { display: flex; flex-direction: column; gap: 1px; }
        .city-tools { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }
        .letter-filter { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 3px; }
        .letter-btn {
            background: #ffffff;
            color: #4b5563;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            min-width: 30px;
            height: 30px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 3px 8px rgba(15, 23, 42, 0.06);
        }
        .letter-btn.active, .letter-btn:hover { background: #d32f2f; border-color: #d32f2f; color: #ffffff; }
        .letter-btn:disabled { opacity: 0.32; cursor: not-allowed; box-shadow: none; }
        .letter-btn:disabled:hover { background: #ffffff; border-color: #e5e7eb; color: #4b5563; }
        .city-empty { border: 1px dashed #d1d5db; border-radius: 18px; background: rgba(255, 255, 255, 0.65); padding: 28px; text-align: center; color: #6b7280; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }
        .modal-card { background: white; border-radius: 22px; width: min(760px, calc(100% - 24px)); max-height: 92vh; overflow: auto; box-shadow: 0 22px 60px rgba(0, 0, 0, 0.25); }
        @media (max-width: 640px) {
            .grid-apps { grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 12px; }
            .category-grid { grid-template-columns: repeat(auto-fit, 122px); }
            .cluster-btn { flex: 1 1 96px; min-width: 96px; }
            .app-name { font-size: 11px; }
            .icon-wrapper { width: 48px; height: 48px; }
            .tab-button { min-width: 120px; font-size: 12px; padding: 8px 12px; }
            .content-tray { padding: 16px; border-radius: 18px; }
            .custom-image-icon { width: 48px; height: 48px; }
            .main-shell { padding: 24px 14px; }
            .top-shell { width: auto; margin: 10px 14px 0; padding: 14px 16px; border-radius: 18px; }
            .signature { margin-top: 14px; }
        }
