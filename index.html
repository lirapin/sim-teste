<html lang="pt-br">

    <style>
        :root {
            --color-primary: #d32f2f;
            --color-primary-dark: #b71c1c;
            --color-primary-hover: #c62828;
            --color-page: #d1d5db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-muted: #7f8c8d;
            --color-border: #e0e0e0;
            --color-highlight: #ffebee;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background: var(--color-page);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }
        
        .app-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
            aspect-ratio: 1 / 0.9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(44, 62, 80, 0.08);
        }
        
        .app-card:hover {
            background: var(--color-highlight);
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(211, 47, 47, 0.15);
        }
        
        .app-card:active {
            transform: translateY(1px);
        }
        
        .icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a5a5a;
            transition: all 0.2s ease;
        }
        
        .app-card:hover .icon-wrapper {
            background: var(--color-primary);
            color: white;
        }
        
        .app-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text);
            text-align: center;
            line-height: 1.3;
            padding: 0 8px;
        }
        
        .folder-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #eef2f3 100%);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
            aspect-ratio: 1 / 0.9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
        }
        
        .folder-card:hover {
            background: var(--color-highlight);
            border-color: var(--color-primary);
            transform: translateY(-2px);
        }
        
        .folder-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--color-primary);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 20px;
            min-width: 28px;
            text-align: center;
        }
        
        .tab-button {
            background: #f3f4f6;
            color: var(--color-text);
            border: none;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .tab-button.active {
            background: var(--color-primary);
            color: white;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }
        
        .tab-button:hover:not(.active) {
            background: #e5e7eb;
            transform: translateY(-1px);
        }
        
        .header-btn {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header-btn:hover {
            background: var(--color-highlight);
            border-color: var(--color-primary);
            transform: translateY(-1px);
        }
        
        .search-input {
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 10px 16px;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        }
        
        .accordion-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.25s ease-out;
        }
        
        .grid-apps {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 16px;
        }
        
        @media (max-width: 640px) {
            .grid-apps {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 12px;
            }
            .app-name {
                font-size: 11px;
            }
            .icon-wrapper {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>

    const buildSearchIndex = (items, path = []) => {
        let results = [];
        items.forEach(item => {
            if (item.type === 'link') {
                results.push({ name: item.name, url: item.url, icon: item.icon, path: [...path] });
            } else if (item.type === 'folder' && item.children) {
                results.push(...buildSearchIndex(item.children, [...path, item.name]));
            }
        });
        return results;
    };

            }

        ]);
    };

        return React.createElement('div', { onClick: onOpen, className: "folder-card group" }, [
