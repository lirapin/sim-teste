    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIM - Sistema Integrado Madrugada</title>
    <style>
        :root {
            --color-primary: #d32f2f;
            --color-primary-dark: #b71c1c;
            --color-primary-hover: #c62828;
            --color-page: #d1d5db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-muted: #7f8c8d;
            --color-border: #e0e0e0;
            --color-highlight: #ffebee;
            --color-field: #fafafa;
            --shadow-soft: 0 18px 42px rgba(44, 62, 80, 0.12);
            --shadow-card: 0 10px 24px rgba(44, 62, 80, 0.10);
            --radius-panel: 20px;
            --radius-card: 16px;
            --radius-control: 12px;
            --transition: 0.3s ease;
            --icon-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            background: var(--color-page);
            color: var(--color-text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            padding: 25px 15px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        :focus-visible {
            outline: 3px solid rgba(211, 47, 47, 0.22);
            outline-offset: 3px;
        }

        .page {
            width: min(100%, 1400px);
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px 25px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-panel);
            box-shadow: var(--shadow-soft);
        }

        .header__badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            flex: 0 0 56px;
            border-radius: 18px;
            background: var(--color-highlight);
            color: var(--color-primary-dark);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .header h1 {
            color: var(--color-primary-dark);
            font-size: 24px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .header p {
            margin-top: 6px;
            color: var(--color-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .app-shell {
            padding: 25px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-panel);
            box-shadow: var(--shadow-soft);
        }

        .search-container {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-field);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-control);
            font-size: 14px;
            transition: all var(--transition);
        }

        .search-box:focus {
            background: #ffffff;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.12);
            outline: none;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
        }

        .tab-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid transparent;
            border-radius: var(--radius-control);
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            background: #f3f4f6;
            color: var(--color-text);
            transition: all var(--transition);
        }

        .tab-btn:hover,
        .tab-btn.active {
            background: var(--color-primary);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(211, 47, 47, 0.22);
        }

        .tab-pane {
            display: none;
            animation: fade 0.3s ease;
        }

        .tab-pane.active-pane {
            display: block;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-section {
            margin-bottom: 32px;
        }

        .category-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-primary-dark);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--color-border);
        }

        .grid-icons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .icon-card {
            display: flex;
            min-height: 120px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px 15px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            color: var(--color-text);
            text-align: center;
            text-decoration: none;
            box-shadow: 0 6px 16px rgba(44, 62, 80, 0.07);
            transition: all var(--transition);
            cursor: pointer;
        }

        .icon-card:hover {
            background: var(--color-highlight);
            border-color: rgba(211, 47, 47, 0.35);
            box-shadow: var(--shadow-card);
            transform: translateY(-2px);
        }

        .icon-card i {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--color-highlight);
            color: var(--icon-color);
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
        }

        .icon-card span {
            color: var(--color-text);
            font-size: 13px;
            font-weight: 700;
            line-height: 1.25;
            word-break: break-word;
        }

        .icon-card small {
            color: var(--color-muted);
            font-size: 11px;
            line-height: 1.35;
        }

        .nested-section {
            margin-left: 20px;
            margin-top: 16px;
            margin-bottom: 24px;
            padding-left: 16px;
            border-left: 2px solid var(--color-border);
        }

        .nested-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 12px;
            padding: 6px 12px;
            background: var(--color-field);
            border-radius: var(--radius-control);
            display: inline-block;
        }

        .subgrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .subcard {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            text-decoration: none;
            color: var(--color-text);
            transition: all var(--transition);
        }

        .subcard:hover {
            background: var(--color-highlight);
            border-color: rgba(211, 47, 47, 0.35);
            transform: translateX(4px);
        }

        .subcard i {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--color-highlight);
            border-radius: 10px;
            color: var(--icon-color);
            font-size: 18px;
            font-style: normal;
            flex-shrink: 0;
        }

        .subcard-info {
            flex: 1;
            text-align: left;
        }

        .subcard-info strong {
            font-size: 13px;
            display: block;
        }

        .subcard-info small {
            font-size: 10px;
            color: var(--color-muted);
        }

        .footer {
            margin-top: 20px;
            padding: 15px;
            color: var(--color-muted);
            font-size: 12px;
            line-height: 1.45;
            text-align: center;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--color-muted);
            font-size: 14px;
        }

        @media (max-width: 680px) {
            body {
                padding: 15px 10px;
            }

            .header,
            .app-shell {
                padding: 20px;
                border-radius: 16px;
            }

            .header {
                align-items: flex-start;
            }

            .header h1 {
                font-size: 22px;
            }

            .tabs {
                width: 100%;
            }

            .tab-btn {
                flex: 1;
                min-width: auto;
            }

            .grid-icons,
            .subgrid {
                grid-template-columns: 1fr;
            }

            .nested-section {
                margin-left: 8px;
                padding-left: 8px;
            }
        }
    </style>
</head>

    function renderItems(items, container) {
        if (!items || items.length === 0) return;
        
        items.forEach(item => {
            if (item.items && item.items.length > 0) {
                const nestedDiv = document.createElement('div');
                nestedDiv.className = 'nested-section';
                const nestedTitle = document.createElement('div');
                nestedTitle.className = 'nested-title';
                nestedTitle.innerHTML = `📁 ${item.title}`;
                nestedDiv.appendChild(nestedTitle);
                
                const subgrid = document.createElement('div');
                subgrid.className = 'subgrid';
                
                function processSubItems(subItems, parentGrid) {
                    subItems.forEach(sub => {
                        if (sub.url) {
                            const card = document.createElement('a');
                            card.href = sub.url;
                            card.target = '_blank';
                            card.rel = 'noopener noreferrer';
                            card.className = 'subcard';
                            card.innerHTML = `
                                <i>${getIconForTitle(sub.title)}</i>
                                <div class="subcard-info">
                                    <strong>${sub.title}</strong>
                                    <small>${sub.url.length > 40 ? sub.url.substring(0, 40) + '...' : sub.url}</small>
                                </div>
                            `;
                            parentGrid.appendChild(card);
                        } else if (sub.items) {
                            const subNestedDiv = document.createElement('div');
                            subNestedDiv.className = 'nested-section';
                            const subNestedTitle = document.createElement('div');
                            subNestedTitle.className = 'nested-title';
                            subNestedTitle.innerHTML = `📂 ${sub.title}`;
                            subNestedDiv.appendChild(subNestedTitle);
                            const subSubgrid = document.createElement('div');
                            subSubgrid.className = 'subgrid';
                            processSubItems(sub.items, subSubgrid);
                            subNestedDiv.appendChild(subSubgrid);
                            parentGrid.parentElement?.appendChild(subNestedDiv);
                        }
                    });
                }
                
                processSubItems(item.items, subgrid);
                nestedDiv.appendChild(subgrid);
                container.appendChild(nestedDiv);
            } else if (item.url) {
                const card = document.createElement('a');
                card.href = item.url;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.className = 'icon-card';
                card.innerHTML = `
                    <i>${getIconForTitle(item.title)}</i>
                    <span>${item.title}</span>
                    <small>${item.url.length > 35 ? item.url.substring(0, 35) + '...' : item.url}</small>
                `;
                container.appendChild(card);
            }
        });
    }

    function renderCategory(category) {
        const section = document.createElement('div');
        section.className = 'category-section';
        
        const title = document.createElement('h3');
        title.className = 'category-title';
        title.textContent = category.title;
        section.appendChild(title);
        
        const grid = document.createElement('div');
        grid.className = 'grid-icons';
        
        if (category.items) {
            category.items.forEach(item => {
                if (item.url) {
                    const card = document.createElement('a');
                    card.href = item.url;
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';
                    card.className = 'icon-card';
                    card.innerHTML = `
                        <i>${getIconForTitle(item.title)}</i>
                        <span>${item.title}</span>
                        <small>${item.url.length > 35 ? item.url.substring(0, 35) + '...' : item.url}</small>
                    `;
                    grid.appendChild(card);
                } else if (item.items) {
                    const nestedDiv = document.createElement('div');
                    nestedDiv.className = 'nested-section';
                    const nestedTitle = document.createElement('div');
                    nestedTitle.className = 'nested-title';
                    nestedTitle.innerHTML = `📁 ${item.title}`;
                    nestedDiv.appendChild(nestedTitle);
                    
                    const subgrid = document.createElement('div');
                    subgrid.className = 'subgrid';
                    
                    item.items.forEach(subItem => {
                        if (subItem.url) {
                            const subcard = document.createElement('a');
                            subcard.href = subItem.url;
                            subcard.target = '_blank';
                            subcard.rel = 'noopener noreferrer';
                            subcard.className = 'subcard';
                            subcard.innerHTML = `
                                <i>${getIconForTitle(subItem.title)}</i>
                                <div class="subcard-info">
                                    <strong>${subItem.title}</strong>
                                    <small>${subItem.url.length > 40 ? subItem.url.substring(0, 40) + '...' : subItem.url}</small>
                                </div>
                            `;
                            subgrid.appendChild(subcard);
                        } else if (subItem.items) {
                            const deepNestedDiv = document.createElement('div');
                            deepNestedDiv.className = 'nested-section';
                            const deepNestedTitle = document.createElement('div');
                            deepNestedTitle.className = 'nested-title';
                            deepNestedTitle.innerHTML = `📂 ${subItem.title}`;
                            deepNestedDiv.appendChild(deepNestedTitle);
                            const deepSubgrid = document.createElement('div');
                            deepSubgrid.className = 'subgrid';
                            
                            subItem.items.forEach(deepItem => {
                                if (deepItem.url) {
                                    const deepCard = document.createElement('a');
                                    deepCard.href = deepItem.url;
                                    deepCard.target = '_blank';
                                    deepCard.rel = 'noopener noreferrer';
                                    deepCard.className = 'subcard';
                                    deepCard.innerHTML = `
                                        <i>${getIconForTitle(deepItem.title)}</i>
                                        <div class="subcard-info">
                                            <strong>${deepItem.title}</strong>
                                            <small>${deepItem.url.length > 40 ? deepItem.url.substring(0, 40) + '...' : deepItem.url}</small>
                                        </div>
                                    `;
                                    deepSubgrid.appendChild(deepCard);
                                }
                            });
                            deepNestedDiv.appendChild(deepSubgrid);
                            subgrid.appendChild(deepNestedDiv);
                        }
                    });
                    nestedDiv.appendChild(subgrid);
                    grid.appendChild(nestedDiv);
                }
            });
        }
        
        section.appendChild(grid);
        return section;
    }

    let currentSearchTerm = '';
    let currentCategory = 'Social';

    function renderAll(searchTerm = '') {
        const container = document.getElementById('contentContainer');
        container.innerHTML = '';
        
        const category = appData.categories.find(c => c.title === currentCategory);
        if (!category) return;
        
        if (searchTerm) {
            const filteredItems = filterItemsBySearch(category.items, searchTerm);
            if (filteredItems.length === 0) {
                container.innerHTML = '<div class="no-results">🔍 Nenhum resultado encontrado para "' + searchTerm + '"</div>';
            } else {
                const filteredCategory = { ...category, items: filteredItems };
                const renderedSection = renderCategory(filteredCategory);
                container.appendChild(renderedSection);
            }
        } else {
            const renderedSection = renderCategory(category);
            container.appendChild(renderedSection);
        }
    }

    function filterItemsBySearch(items, term) {
        const lowerTerm = term.toLowerCase();
        const result = [];
        
        items.forEach(item => {
            if (item.url && (item.title.toLowerCase().includes(lowerTerm) || item.url.toLowerCase().includes(lowerTerm))) {
                result.push(item);
            } else if (item.items) {
                const filteredSubItems = filterItemsBySearch(item.items, term);
                if (filteredSubItems.length > 0) {
                    result.push({ ...item, items: filteredSubItems });
                }
            }
        });
        
        return result;
    }

    function initTabs() {
        const tabsNav = document.getElementById('tabsNav');
        tabsNav.innerHTML = '';
        
        appData.categories.forEach(cat => {
            const button = document.createElement('button');
            button.className = 'tab-btn' + (currentCategory === cat.title ? ' active' : '');
            button.textContent = cat.title;
            button.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentCategory = cat.title;
                renderAll(currentSearchTerm);
            });
            tabsNav.appendChild(button);
        });
    }

    function initSearch() {
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            currentSearchTerm = e.target.value;
            renderAll(currentSearchTerm);
        });
    }

    function init() {
        initTabs();
        initSearch();
        renderAll('');
    }

    init();
</script>
</body>
</html>
