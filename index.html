        * { margin: 0; padding: 0; box-sizing: border-box; }

        .app-card, .folder-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
            aspect-ratio: 1 / 0.9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(44, 62, 80, 0.08);
            position: relative;
        }
        .app-card:hover, .folder-card:hover {
            background: #ffebee;
            border-color: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(211, 47, 47, 0.15);
        }
        .icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a5a5a;
            transition: all 0.2s ease;
        }
        .app-card:hover .icon-wrapper, .folder-card:hover .icon-wrapper { color: #d32f2f; }
        .app-name { font-size: 13px; font-weight: 600; color: #2c3e50; text-align: center; line-height: 1.3; padding: 0 8px; word-break: break-word; }
        .folder-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #d32f2f;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 20px;
            min-width: 28px;
            text-align: center;
        }
        .tab-button {
            background: #f3f4f6;
            color: #2c3e50;
            border: none;
            padding: 10px 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            min-width: 140px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tab-button.active { background: #d32f2f; color: white; box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3); }
        .tab-button:hover:not(.active) { background: #e5e7eb; transform: translateY(-1px); }
        .header-btn {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:hover { background: #ffebee; border-color: #d32f2f; }
        .search-input {
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px 44px 10px 16px;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }
        .search-input:focus { outline: none; border-color: #d32f2f; box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1); }
        .search-button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #6b7280;
            padding: 8px;
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-button:hover { background: #ffebee; color: #d32f2f; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        .grid-apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; }
        .login-card { background: white; border: 1px solid #e0e0e0; border-radius: 24px; box-shadow: 0 18px 45px rgba(44, 62, 80, 0.18); }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }
        .modal-card { background: white; border-radius: 22px; width: min(500px, 100%); max-height: 85vh; overflow: auto; box-shadow: 0 22px 60px rgba(0, 0, 0, 0.25); }
        @media (max-width: 640px) {
            .grid-apps { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 12px; }
            .app-name { font-size: 11px; }
            .icon-wrapper { width: 48px; height: 48px; }
            .tab-button { min-width: 120px; font-size: 12px; padding: 8px 12px; }
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #d32f2f; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #b71c1c; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    const normalizeText = (text) => {
        return String(text || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    };

    const countLinks = (item) => {
        if (!item.children) return 0;
        return item.children.reduce((acc, child) => {
            return acc + (child.type === 'link' ? 1 : countLinks(child));
        }, 0);
    };

    const buildSearchIndex = (items, path = []) => {
        let results = [];
        items.forEach(item => {
            if (item.type === 'link') {
                results.push({ ...item, path: [...path], searchable: normalizeText([...path, item.name].join(' ')) });
            } else if (item.type === 'folder' && item.children) {
                results.push(...buildSearchIndex(item.children, [...path, item.name]));
            }
        });
        return results;
    };

    const searchIndex = buildSearchIndex(bookmarkData);

    const IconComponent = ({ name, size = 24, className = "" }) => {
        if (CustomIcons[name]) {
            const CustomIcon = CustomIcons[name];
            return React.createElement(CustomIcon, { size, className });
        }
        const Icon = lucide && lucide[name];
        if (!Icon) return React.createElement('div', { className, style: { width: size, height: size, background: '#e0e0e0', borderRadius: '8px' } });
        return React.createElement(Icon, { size, className, strokeWidth: 1.8 });
    };

    const AppCard = ({ item, onFolderOpen }) => {
        const isFolder = item.type === 'folder';
        const linkCount = isFolder ? countLinks(item) : 0;
        const handleClick = () => {
            if (isFolder && onFolderOpen) onFolderOpen(item);
            else if (item.url) window.open(item.url, '_blank', 'noopener,noreferrer');
        };
        return React.createElement('div', { className: `${isFolder ? 'folder-card' : 'app-card'} fade-in`, onClick: handleClick }, [
            isFolder && linkCount > 0 && React.createElement('div', { key: 'badge', className: 'folder-badge' }, linkCount),
            React.createElement('div', { key: 'icon', className: 'icon-wrapper' }, React.createElement(IconComponent, { name: item.icon || (isFolder ? 'Folder' : 'Link'), size: 32 })),
            React.createElement('div', { key: 'name', className: 'app-name' }, item.name.length > 35 ? item.name.substring(0, 32) + '...' : item.name)
        ]);
    };

    const LoginPage = ({ onLogin }) => {
        const [username, setUsername] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [error, setError] = React.useState('');
        const handleSubmit = (e) => {
            e.preventDefault();
            const user = USERS.find(u => u.username === username && u.password === password);
            if (user) onLogin(user);
            else setError('Usuário ou senha inválidos');
        };
        return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-5', style: { background: '#d1d5db' } }, 
            React.createElement('form', { onSubmit: handleSubmit, className: 'login-card p-8 w-full max-w-sm' }, [
                React.createElement('div', { key: 'logo', className: 'mx-auto w-16 h-16 rounded-2xl bg-red-600 flex items-center justify-center text-white mb-4 shadow-md' }, React.createElement(IconComponent, { name: 'Star', size: 34 })),
                React.createElement('h1', { key: 'title', className: 'text-2xl font-bold text-center text-red-700 mb-1' }, 'SIM'),
                React.createElement('p', { key: 'sub', className: 'text-center text-sm text-gray-500 mb-6' }, 'Sistema Integrado Madrugada'),
                React.createElement('input', { key: 'user', type: 'text', className: 'search-input mb-3', placeholder: 'Usuário', value: username, onChange: (e) => setUsername(e.target.value) }),
                React.createElement('input', { key: 'pass', type: 'password', className: 'search-input mb-3', placeholder: 'Senha', value: password, onChange: (e) => setPassword(e.target.value) }),
                error && React.createElement('p', { key: 'error', className: 'text-sm text-red-600 mb-3 text-center' }, error),
                React.createElement('button', { key: 'btn', type: 'submit', className: 'w-full bg-red-600 hover:bg-red-700 text-white font-semibold rounded-2xl py-3 transition-all' }, 'Entrar')
            ])
        );
    };

    const CategoryTabs = ({ categories, activeCategory, onSelect }) => {
        return React.createElement('div', { className: 'flex gap-2 overflow-x-auto pb-2 mb-6 scrollbar-hide' }, 
            categories.map(cat => React.createElement('button', { key: cat.name, onClick: () => onSelect(cat.name), className: `tab-button ${activeCategory === cat.name ? 'active' : ''}` }, [
                React.createElement(IconComponent, { key: 'icon', name: cat.icon || 'Folder', size: 16, className: 'mr-2' }),
                cat.name
            ]))
        );
    };

    const SearchResults = ({ searchTerm }) => {
        const normalizedSearch = normalizeText(searchTerm);
        const results = React.useMemo(() => {
            if (!normalizedSearch) return [];
            return searchIndex.filter(item => normalizeText(item.name).includes(normalizedSearch) || item.searchable.includes(normalizedSearch));
        }, [normalizedSearch]);
        if (results.length === 0) {
            return React.createElement('div', { className: 'text-center py-20' }, [
                React.createElement(IconComponent, { key: 'icon', name: 'Search', size: 48, className: 'mx-auto text-gray-400 mb-4' }),
                React.createElement('p', { key: 'text', className: 'text-gray-500' }, `Nenhum resultado encontrado para "${searchTerm}"`)
            ]);
        }
        return React.createElement('div', { className: 'grid-apps fade-in' }, results.map((result, idx) => React.createElement(AppCard, { key: `${result.name}-${idx}`, item: result })));
    };

    const FolderView = ({ folder, onOpenFolder, onBack }) => {
        return React.createElement(React.Fragment, null, [
            React.createElement('div', { key: 'nav', className: 'flex items-center gap-3 mb-6' }, [
                React.createElement('button', { onClick: onBack, className: 'header-btn' }, [React.createElement(IconComponent, { key: 'icon', name: 'ArrowLeft', size: 18 }), React.createElement('span', { key: 'text', className: 'ml-2 font-semibold' }, 'Voltar')]),
                React.createElement('h2', { key: 'title', className: 'text-xl font-bold text-gray-700' }, folder.name)
            ]),
            React.createElement('div', { key: 'grid', className: 'grid-apps' }, folder.children.map((item, idx) => React.createElement(AppCard, { key: `${item.name}-${idx}`, item, onFolderOpen: onOpenFolder })))
        ]);
    };

    const App = () => {
        const [user, setUser] = React.useState(() => { const saved = localStorage.getItem('sim_user'); return saved ? JSON.parse(saved) : null; });
        const [activeCategory, setActiveCategory] = React.useState(bookmarkData[0]?.name || 'SIM');
        const [searchTerm, setSearchTerm] = React.useState('');
        const [navigationStack, setNavigationStack] = React.useState([]);
        const [currentFolder, setCurrentFolder] = React.useState(null);
        const [showMessages, setShowMessages] = React.useState(false);
        const [messages, setMessagesState] = React.useState(() => { const saved = localStorage.getItem('sim_messages'); return saved ? JSON.parse(saved) : []; });

        const setMessages = (newMessages) => { setMessagesState(newMessages); localStorage.setItem('sim_messages', JSON.stringify(newMessages)); };

        const handleLogin = (userData) => { setUser(userData); localStorage.setItem('sim_user', JSON.stringify(userData)); };
        const handleLogout = () => { localStorage.removeItem('sim_user'); setUser(null); setCurrentFolder(null); setNavigationStack([]); setSearchTerm(''); };
        const openFolder = (folder) => { setNavigationStack(prev => [...prev, currentFolder || bookmarkData.find(c => c.name === activeCategory)]); setCurrentFolder(folder); setSearchTerm(''); };
        const goBack = () => { const previous = navigationStack[navigationStack.length - 1]; setNavigationStack(prev => prev.slice(0, -1)); setCurrentFolder(previous); };
        const selectCategory = (categoryName) => { setActiveCategory(categoryName); setCurrentFolder(null); setNavigationStack([]); setSearchTerm(''); };

        if (!user) return React.createElement(LoginPage, { onLogin: handleLogin });

        const currentCategory = bookmarkData.find(c => c.name === activeCategory);
        const displayContent = () => {
            if (searchTerm) return React.createElement(SearchResults, { searchTerm });
            if (currentFolder) return React.createElement(FolderView, { folder: currentFolder, onOpenFolder: openFolder, onBack: goBack });
            if (!currentCategory) return React.createElement('div', null, 'Categoria não encontrada');
            return React.createElement(React.Fragment, null, [
                React.createElement(CategoryTabs, { key: 'tabs', categories: bookmarkData, activeCategory, onSelect: selectCategory }),
                React.createElement('div', { key: 'grid', className: 'grid-apps' }, currentCategory.children.map((item, idx) => React.createElement(AppCard, { key: `${item.name}-${idx}`, item, onFolderOpen: openFolder })))
            ]);
        };

        const MessageCenter = ({ user, messages, setMessages, onClose }) => {
            const [target, setTarget] = React.useState('todos');
            const [text, setText] = React.useState('');
            const visibleMessages = messages.filter(m => m.to === 'todos' || m.to === user.username);
            const sendMessage = () => {
                if (!text.trim()) return;
                const newMessage = { id: Date.now(), from: user.username, to: target, text: text.trim(), date: new Date().toLocaleString('pt-BR') };
                setMessages([newMessage, ...messages]);
                setText('');
            };
            return React.createElement('div', { className: 'modal-overlay', onClick: (e) => { if (e.target === e.currentTarget) onClose(); } }, 
                React.createElement('div', { className: 'modal-card p-5' }, [
                    React.createElement('div', { key: 'header', className: 'flex items-center justify-between mb-4' }, [
                        React.createElement('h2', { className: 'text-xl font-bold text-red-700' }, 'Central de Mensagens'),
                        React.createElement('button', { onClick: onClose, className: 'header-btn' }, React.createElement(IconComponent, { name: 'X', size: 18 }))
                    ]),
                    user.role === 'admin' && React.createElement('div', { key: 'admin-area', className: 'border rounded-2xl p-4 mb-4 bg-gray-50' }, [
                        React.createElement('p', { className: 'text-sm font-semibold mb-2' }, 'Enviar mensagem'),
                        React.createElement('select', { className: 'search-input mb-2', value: target, onChange: (e) => setTarget(e.target.value) }, [
                            React.createElement('option', { key: 'todos', value: 'todos' }, 'Todos os usuários'),
                            ...USERS.map(u => React.createElement('option', { key: u.username, value: u.username }, u.displayName))
                        ]),
                        React.createElement('textarea', { className: 'search-input mb-2', rows: 3, placeholder: 'Digite sua mensagem...', value: text, onChange: (e) => setText(e.target.value) }),
                        React.createElement('button', { onClick: sendMessage, className: 'bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl px-4 py-2 transition-all' }, 'Enviar mensagem')
                    ]),
                    React.createElement('div', { className: 'space-y-3 max-h-96 overflow-y-auto' }, visibleMessages.length === 0 ? 
                        React.createElement('p', { className: 'text-gray-500 text-center py-8' }, 'Nenhuma mensagem disponível') : 
                        visibleMessages.map(m => React.createElement('div', { key: m.id, className: 'border rounded-2xl p-4' }, [
                            React.createElement('div', { className: 'text-xs text-gray-500 mb-1' }, `${m.date} • De: ${m.from} • Para: ${m.to === 'todos' ? 'Todos' : m.to}`),
                            React.createElement('p', { className: 'text-sm text-gray-800' }, m.text)
                        ]))
                    )
                ])
            );
        };

        return React.createElement('div', { className: 'min-h-screen', style: { background: '#d1d5db' } }, [
            React.createElement('header', { key: 'header', className: 'bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm' }, 
                React.createElement('div', { className: 'max-w-7xl mx-auto px-5 py-4' }, 
                    React.createElement('div', { className: 'flex flex-col md:flex-row md:items-center md:justify-between gap-4' }, [
                        React.createElement('div', { key: 'brand', className: 'flex items-center gap-3' }, [
                            React.createElement('div', { className: 'w-12 h-12 rounded-2xl bg-red-600 flex items-center justify-center shadow-md text-white' }, React.createElement(IconComponent, { name: 'Star', size: 26 })),
                            React.createElement('div', {}, [React.createElement('h1', { className: 'text-2xl font-bold text-red-700' }, 'SIM'), React.createElement('p', { className: 'text-xs text-gray-500' }, `Bem-vindo, ${user.displayName}`)])
                        ]),
                        React.createElement('div', { key: 'actions', className: 'flex items-center gap-3 flex-1 md:max-w-xl' }, [
                            React.createElement('div', { key: 'search', className: 'relative flex-1' }, [
                                React.createElement('input', { type: 'text', className: 'search-input', placeholder: 'Buscar ferramentas...', value: searchTerm, onChange: (e) => setSearchTerm(e.target.value) }),
                                searchTerm && React.createElement('button', { className: 'search-button', onClick: () => setSearchTerm('') }, React.createElement(IconComponent, { name: 'X', size: 18 }))
                            ]),
                            React.createElement('button', { key: 'messages', onClick: () => setShowMessages(true), className: 'header-btn', title: 'Mensagens' }, React.createElement(IconComponent, { name: 'MessageCircle', size: 18 })),
                            React.createElement('button', { key: 'logout', onClick: handleLogout, className: 'header-btn', title: 'Sair' }, React.createElement(IconComponent, { name: 'LogOut', size: 18 }))
                        ])
                    ])
                )
            ),
            React.createElement('main', { key: 'main', className: 'max-w-7xl mx-auto px-5 py-8' }, displayContent()),
            showMessages && React.createElement(MessageCenter, { key: 'messages', user, messages, setMessages, onClose: () => setShowMessages(false) })
        ]);
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
</script>
