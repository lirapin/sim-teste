            justify-content: center;

            font-family: inherit;
        }
        .app-card:hover, .folder-card:hover {

            border-color: #d32f2f;

        .app-card:active, .folder-card:active {

        }
        .icon-wrapper {
            width: 56px;
            height: 56px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease;
        }
        .icon-wrapper::before {
            content: "";
            position: absolute;
            width: 48px;
            height: 42px;
            background: rgba(244, 63, 94, 0.14);
            border-radius: 47% 53% 45% 55% / 58% 42% 54% 46%;
            transform: rotate(-8deg);
            filter: blur(0.2px);
            z-index: 0;
        }
        .app-card:hover .icon-wrapper::before, .folder-card:hover .icon-wrapper::before {
            background: rgba(244, 63, 94, 0.2);
            transform: rotate(6deg) scale(1.06);
        }
        .emoji-icon { font-size: 34px; line-height: 1; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
        .app-card:hover .emoji-icon, .folder-card:hover .emoji-icon { transform: scale(1.08); }
        .brand-icon {

            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            line-height: 1;
            filter: drop-shadow(0 5px 8px rgba(15, 23, 42, 0.14));
            position: relative;
            z-index: 1;
        }

        .onedrive-logo::before { content: "\2601"; }
        .custom-image-icon {
            width: 54px;
            height: 54px;
            object-fit: contain;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 5px 8px rgba(15, 23, 42, 0.12));
        }
        .custom-image-icon.rounded-brand { border-radius: 12px; }
        .app-card:hover .brand-icon, .folder-card:hover .brand-icon { transform: scale(1.08); }
        .app-card:hover .custom-image-icon, .folder-card:hover .custom-image-icon { transform: scale(1.08); }
        .app-name { font-size: 13px; font-weight: 600; color: #2c3e50; text-align: center; line-height: 1.3; padding: 0 8px; word-break: break-word; }
        .tab-button {
            background: #ffffff;
            color: #2c3e50;
            border: 1px solid #e5e7eb;
            padding: 10px 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            min-width: 140px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tab-button.active { background: #d32f2f; color: white; border-color: #d32f2f; box-shadow: 0 8px 18px rgba(211, 47, 47, 0.28); }
        .tab-button:hover:not(.active) { background: #fff7f7; border-color: #f0b4b4; transform: translateY(-1px); }
        .tab-button:active, .header-btn:active { transform: translateY(1px) scale(0.98); box-shadow: inset 0 2px 6px rgba(15, 23, 42, 0.14); }
        .header-btn {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .header-btn:hover { background: #ffebee; border-color: #d32f2f; }

            content: "";

            height: 26px;

            border-radius: 48% 52% 44% 56% / 58% 42% 55% 45%;
            transform: rotate(-8deg);
            z-index: 0;
        }
        .search-input {
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 10px 44px 10px 16px;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s ease;

        }
        .search-input:focus { outline: none; border-color: #d32f2f; box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1); }

            top: 50%;

            color: #6b7280;
            padding: 8px;
            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;
        }

    const LoginPage = ({ onLogin }) => {

                React.createElement('input', { key: 'pass', type: 'password', className: 'search-input mb-3', placeholder: 'Senha', value: password, onChange: (e) => setPassword(e.target.value) }),
                error && React.createElement('p', { key: 'error', className: 'text-sm text-red-600 mb-3 text-center' }, error),
                React.createElement('button', { key: 'btn', type: 'submit', className: 'w-full bg-red-600 hover:bg-red-700 text-white font-semibold rounded-2xl py-3 transition-all' }, 'Entrar')

    const CategoryTabs = ({ categories, activeCategory, onSelect }) => {

            categories.map(cat => React.createElement('button', { key: cat.name, onClick: () => onSelect(cat.name), className: `tab-button ${activeCategory === cat.name ? 'active' : ''}` }, cat.name))

    const SearchResults = ({ searchTerm }) => {
        const normalizedSearch = normalizeText(searchTerm);
        const results = React.useMemo(() => {

        }, [folder, isSearchableFolder, normalizedFolderSearch, activeLetter]);
        const folderTools = isSearchableFolder && React.createElement('div', { key: 'city-tools', className: 'city-tools fade-in' }, [
            React.createElement('div', { key: 'search', className: 'relative' }, [
                React.createElement('input', {
                    key: 'input',
                    type: 'text',
                    className: 'search-input',
                    placeholder: `Buscar cidade em ${folder.name}...`,
                    value: folderSearch,
                    onChange: (e) => { setFolderSearch(e.target.value); setActiveLetter(''); }
                }),
                folderSearch && React.createElement('button', { key: 'clear', className: 'search-button', onClick: () => setFolderSearch('') }, React.createElement(IconComponent, { name: 'X', size: 18 }))
            ]),
            React.createElement('div', { key: 'letters', className: 'letter-filter scrollbar-hide' }, alphabet.map(letter => React.createElement('button', {
                key: letter,
                type: 'button',
                className: `letter-btn ${activeLetter === letter ? 'active' : ''}`,
                disabled: !availableLetters.has(letter),
                onClick: () => { setActiveLetter(activeLetter === letter ? '' : letter); setFolderSearch(''); }
            }, letter)))
        ]);
        const content = visibleChildren.length > 0
            ? React.createElement('div', { key: 'grid', className: 'grid-apps' }, visibleChildren.map((item, idx) => React.createElement(AppCard, { key: `${item.name}-${idx}`, item, onFolderOpen: onOpenFolder })))
            : (isSearchableFolder ? null : React.createElement('div', { key: 'empty', className: 'city-empty' }, 'Nenhum item encontrado.'));

        return React.createElement('div', { className: 'tray-inner' }, [
            React.createElement('div', { key: 'nav', className: 'flex items-center gap-3 mb-6' }, [
                React.createElement('button', { onClick: onBack, className: 'back-emoji-btn', title: 'Retornar', 'aria-label': 'Retornar' }, React.createElement('img', { className: 'back-image-icon', src: 'assets/icons/icons8-undo-100.png', alt: '', 'aria-hidden': 'true' })),
                React.createElement('h2', { key: 'title', className: 'text-xl font-bold text-gray-700' }, folder.name)
            ]),
            folderTools,
            content
        ]);
    };

    const App = () => {
        const [user, setUser] = React.useState(() => { const saved = localStorage.getItem('sim_user'); return saved ? JSON.parse(saved) : null; });
        const [activeCategory, setActiveCategory] = React.useState(bookmarkData[0]?.name || 'SIM');
        const [searchTerm, setSearchTerm] = React.useState('');
        const [navigationStack, setNavigationStack] = React.useState([]);
        const [currentFolder, setCurrentFolder] = React.useState(null);
        const [showMessages, setShowMessages] = React.useState(false);
        const [messages, setMessagesState] = React.useState(() => { const saved = localStorage.getItem('sim_messages'); return saved ? JSON.parse(saved) : []; });

        const setMessages = (newMessages) => { setMessagesState(newMessages); localStorage.setItem('sim_messages', JSON.stringify(newMessages)); };

        const handleLogin = (userData) => { setUser(userData); localStorage.setItem('sim_user', JSON.stringify(userData)); };
        const handleLogout = () => { localStorage.removeItem('sim_user'); setUser(null); setCurrentFolder(null); setNavigationStack([]); setSearchTerm(''); };
        const openFolder = (folder) => { setNavigationStack(prev => [...prev, currentFolder || bookmarkData.find(c => c.name === activeCategory)]); setCurrentFolder(folder); setSearchTerm(''); };
        const goBack = () => { const previous = navigationStack[navigationStack.length - 1]; setNavigationStack(prev => prev.slice(0, -1)); setCurrentFolder(previous); };
        const selectCategory = (categoryName) => { setActiveCategory(categoryName); setCurrentFolder(null); setNavigationStack([]); setSearchTerm(''); };
        const goHome = () => { setActiveCategory('SIM'); setCurrentFolder(null); setNavigationStack([]); setSearchTerm(''); };

        if (!user) return React.createElement(LoginPage, { onLogin: handleLogin });

        const currentCategory = bookmarkData.find(c => c.name === activeCategory);
        const displayContent = () => {
            if (searchTerm) return React.createElement(SearchResults, { searchTerm });
            if (currentFolder) return React.createElement(FolderView, { folder: currentFolder, onOpenFolder: openFolder, onBack: goBack });
            if (!currentCategory) return React.createElement('div', null, 'Categoria não encontrada');
            return React.createElement('div', { className: 'tray-inner category-layout' }, [
                React.createElement(CategoryTabs, { key: 'tabs', categories: bookmarkData, activeCategory, onSelect: selectCategory }),
                React.createElement('div', { key: 'grid', className: 'grid-apps' }, currentCategory.children.map((item, idx) => React.createElement(AppCard, { key: `${item.name}-${idx}`, item, onFolderOpen: openFolder })))
            ]);
        };

        const MessageCenter = ({ user, messages, setMessages, onClose }) => {
            const [target, setTarget] = React.useState('todos');
            const [text, setText] = React.useState('');
            const visibleMessages = messages.filter(m => m.to === 'todos' || m.to === user.username);
            const sendMessage = () => {
                if (!text.trim()) return;
                const newMessage = { id: Date.now(), from: user.username, to: target, text: text.trim(), date: new Date().toLocaleString('pt-BR') };
                setMessages([newMessage, ...messages]);
                setText('');
            };
            return React.createElement('div', { className: 'modal-overlay', onClick: (e) => { if (e.target === e.currentTarget) onClose(); } }, 
                React.createElement('div', { className: 'modal-card p-5' }, [
                    React.createElement('div', { key: 'header', className: 'flex items-center justify-between mb-4' }, [
                        React.createElement('h2', { className: 'text-xl font-bold text-red-700' }, 'Central de Mensagens'),
                        React.createElement('button', { onClick: onClose, className: 'header-btn' }, React.createElement(IconComponent, { name: 'X', size: 18 }))
                    ]),
                    user.role === 'admin' && React.createElement('div', { key: 'admin-area', className: 'border rounded-2xl p-4 mb-4 bg-gray-50' }, [
                        React.createElement('p', { className: 'text-sm font-semibold mb-2' }, 'Enviar mensagem'),
                        React.createElement('select', { className: 'search-input mb-2', value: target, onChange: (e) => setTarget(e.target.value) }, [
                            React.createElement('option', { key: 'todos', value: 'todos' }, 'Todos os usuários'),
                            ...USERS.map(u => React.createElement('option', { key: u.username, value: u.username }, u.displayName))
                        ]),
                        React.createElement('textarea', { className: 'search-input mb-2', rows: 3, placeholder: 'Digite sua mensagem...', value: text, onChange: (e) => setText(e.target.value) }),
                        React.createElement('button', { onClick: sendMessage, className: 'bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl px-4 py-2 transition-all' }, 'Enviar mensagem')
                    ]),
                    React.createElement('div', { className: 'space-y-3 max-h-96 overflow-y-auto' }, visibleMessages.length === 0 ? 
                        React.createElement('p', { className: 'text-gray-500 text-center py-8' }, 'Nenhuma mensagem disponível') : 
                        visibleMessages.map(m => React.createElement('div', { key: m.id, className: 'border rounded-2xl p-4' }, [
                            React.createElement('div', { className: 'text-xs text-gray-500 mb-1' }, `${m.date} • De: ${m.from} • Para: ${m.to === 'todos' ? 'Todos' : m.to}`),
                            React.createElement('p', { className: 'text-sm text-gray-800' }, m.text)
                        ]))
                    )
                ])
            );
        };

        return React.createElement('div', { className: 'min-h-screen', style: { background: '#d1d5db' } }, [
            React.createElement('header', { key: 'header', className: 'sticky top-0 z-10 py-1' },
                React.createElement('div', { className: 'top-shell' },
                    React.createElement('div', { className: 'flex flex-col md:flex-row md:items-center md:justify-between gap-4' }, [
                        React.createElement('button', { key: 'brand', type: 'button', onClick: goHome, className: 'brand-home-btn flex items-center gap-3', title: 'Voltar para SIM', 'aria-label': 'Voltar para SIM' }, [
                            React.createElement('div', { className: 'w-12 h-12 flex items-center justify-center' }, React.createElement('img', { className: 'portal-logo', src: 'assets/icons/icons8-owl-100.png', alt: '', 'aria-hidden': 'true' })),
                            React.createElement('div', { className: 'brand-copy' }, [
                                React.createElement('h1', { key: 'title', className: 'text-2xl font-bold text-red-700' }, 'SIM'),
                                React.createElement('p', { key: 'subtitle', className: 'text-xs font-semibold text-gray-600' }, 'Sistema Integrado Madrugada'),
                                React.createElement('p', { key: 'welcome', className: 'text-xs text-gray-500' }, `Bem vinda, ${user.displayName}`)
                            ])
                        ]),
                        React.createElement('div', { key: 'actions', className: 'flex items-center gap-3 flex-1 md:max-w-xl' }, [
                            React.createElement('div', { key: 'search', className: 'relative flex-1' }, [
                                React.createElement('input', { type: 'text', className: 'search-input', placeholder: 'Buscar ferramentas...', value: searchTerm, onChange: (e) => setSearchTerm(e.target.value) }),
                                searchTerm && React.createElement('button', { className: 'search-button', onClick: () => setSearchTerm('') }, React.createElement(IconComponent, { name: 'X', size: 18 }))
                            ]),
                            React.createElement('button', { key: 'menu', onClick: () => {}, className: 'header-btn', title: 'Menu', 'aria-label': 'Menu' }, React.createElement('img', { className: 'top-image-icon', src: 'assets/icons/icons8-cardapio-100.png', alt: '', 'aria-hidden': 'true' })),
                            React.createElement('button', { key: 'messages', onClick: () => setShowMessages(true), className: 'header-btn message-btn', title: 'Minhas mensagens', 'aria-label': 'Minhas mensagens' }, React.createElement('img', { className: 'top-image-icon', src: 'assets/icons/message-envelope.svg', alt: '', 'aria-hidden': 'true' })),
                            React.createElement('button', { key: 'logout', onClick: handleLogout, className: 'header-btn', title: 'Sair', 'aria-label': 'Sair' }, React.createElement('img', { className: 'top-image-icon', src: 'assets/icons/icons8-cancel-100.png', alt: '', 'aria-hidden': 'true' }))
                        ])

            React.createElement('main', { key: 'main', className: 'main-shell' },
                React.createElement('section', { key: 'tray', className: 'content-tray fade-in' }, displayContent())
            ),
            showMessages && React.createElement(MessageCenter, { key: 'messages', user, messages, setMessages, onClose: () => setShowMessages(false) })
        ]);
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
</script>
